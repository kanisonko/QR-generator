<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR Code Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1rem;
    color: #1a1a1a;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  header p {
    font-size: 0.875rem;
    color: #666;
    margin-top: 0.25rem;
  }

  .card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 1.5rem;
    width: 100%;
    max-width: 480px;
  }

  .card + .card {
    margin-top: 1rem;
  }

  label {
    display: block;
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 0.4rem;
  }

  input[type="text"] {
    width: 100%;
    padding: 0.6rem 0.75rem;
    font-size: 0.9rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus { border-color: #333; }

  .row {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .field { flex: 1; min-width: 120px; }

  input[type="range"] {
    width: 100%;
    margin-top: 0.3rem;
    accent-color: #333;
  }

  .color-wrap {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.3rem;
  }

  input[type="color"] {
    width: 36px;
    height: 36px;
    border: 1px solid #ddd;
    border-radius: 6px;
    cursor: pointer;
    padding: 2px;
  }

  button {
    padding: 0.6rem 1.25rem;
    font-size: 0.875rem;
    font-family: inherit;
    border: 1px solid #333;
    border-radius: 8px;
    background: #1a1a1a;
    color: #fff;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.8; }

  button.secondary {
    background: #fff;
    color: #333;
    border-color: #ddd;
  }

  .btn-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0;
  }

  #resultCard {
    display: none;
    text-align: center;
  }

  #qrCanvas {
    display: inline-block;
    margin-bottom: 1rem;
    border-radius: 8px;
    overflow: hidden;
  }

  #urlLabel {
    font-size: 0.78rem;
    color: #888;
    word-break: break-all;
    margin-bottom: 1.25rem;
  }

  footer {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: #aaa;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #f0f0f0; }
    .card { background: #1c1c1c; border-color: #333; }
    input[type="text"] { background: #2a2a2a; border-color: #444; color: #f0f0f0; }
    input[type="text"]:focus { border-color: #aaa; }
    button.secondary { background: #1c1c1c; color: #f0f0f0; border-color: #444; }
    label { color: #aaa; }
  }
</style>
</head>
<body>

<header>
  <h1>QR Code Generator</h1>
  <p>แปลงลิงก์เป็น QR Code พร้อมดาวน์โหลด</p>
</header>

<div class="card">
  <label for="urlInput">URL ที่ต้องการแปลง</label>
  <input type="text" id="urlInput" placeholder="https://example.com" />

  <div class="row">
    <div class="field">
      <label>ขนาด: <span id="sizeVal">256</span> px</label>
      <input type="range" id="sizeSlider" min="128" max="512" step="64" value="256"
        oninput="document.getElementById('sizeVal').textContent = this.value" />
    </div>
    <div class="field">
      <label>สี QR</label>
      <div class="color-wrap">
        <input type="color" id="colorPicker" value="#000000" />
        <span id="colorHex" style="font-size:0.8rem; color:#666;">#000000</span>
      </div>
    </div>
  </div>

  <div class="row" style="margin-top: 1.25rem;">
    <button onclick="generate()">สร้าง QR Code</button>
  </div>
</div>

<div class="card" id="resultCard">
  <div id="qrCanvas"></div>
  <p id="urlLabel"></p>
  <div class="btn-row" style="justify-content: center;">
    <button onclick="downloadPNG()">⬇ ดาวน์โหลด PNG</button>
    <button class="secondary" onclick="copyImg()" id="copyBtn">คัดลอกรูป</button>
  </div>
</div>

<footer>สร้างด้วย qrcode.js — ใช้งานได้ฟรีภายในองค์กร</footer>

<script>
document.getElementById('colorPicker').addEventListener('input', function() {
  document.getElementById('colorHex').textContent = this.value;
});

document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') generate();
});

function generate() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { alert('กรุณาใส่ URL ก่อนครับ'); return; }

  const size = parseInt(document.getElementById('sizeSlider').value);
  const color = document.getElementById('colorPicker').value;

  const container = document.getElementById('qrCanvas');
  container.innerHTML = '';

  // ลอง error correction level จากสูงสุดไปต่ำสุด เพื่อรองรับ URL ยาวๆ
  const levels = [
    QRCode.CorrectLevel.H,
    QRCode.CorrectLevel.Q,
    QRCode.CorrectLevel.M,
    QRCode.CorrectLevel.L
  ];

  let success = false;
  for (const level of levels) {
    try {
      container.innerHTML = '';
      new QRCode(container, {
        text: url,
        width: size,
        height: size,
        colorDark: color,
        colorLight: '#ffffff',
        correctLevel: level
      });
      // ตรวจว่า QR สร้างจริงๆ (มี canvas หรือ img)
      if (container.querySelector('canvas') || container.querySelector('img')) {
        success = true;
        break;
      }
    } catch (e) {
      // ลอง level ถัดไป
    }
  }

  if (!success) {
    container.innerHTML = '';
    alert('URL ยาวเกินไปจนสร้าง QR Code ไม่ได้ครับ\nลองย่อลิงก์ก่อนได้ที่ tinyurl.com หรือ bit.ly');
    return;
  }

  document.getElementById('urlLabel').textContent = url;
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function getCanvas() {
  return document.querySelector('#qrCanvas canvas');
}

function downloadPNG() {
  const canvas = getCanvas();
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function copyImg() {
  const canvas = getCanvas();
  if (!canvas) return;
  canvas.toBlob(blob => {
    navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
      .then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✓ คัดลอกแล้ว';
        setTimeout(() => { btn.textContent = 'คัดลอกรูป'; }, 2000);
      })
      .catch(() => alert('เบราว์เซอร์ไม่รองรับการคัดลอกรูป ลองดาวน์โหลดแทนครับ'));
  });
}
</script>
</body>
</html>
